<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register - Dream Come Tours</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />

    <!-- External CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top w-100">
    <div class="container">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent">
            <i class="ri-more-2-fill"></i>
        </button>

        <a class="navbar-brand logo" href="./index.html">
            <div class="logo-text">
                <span class="top">Dream</span>
                <span class="middle">Come</span>
                <span class="bottom">Tours</span>
            </div>
        </a>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mx-auto gap-4">
                <li class="nav-item"><a class="nav-link" href="./index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="./destination.html">Destinations</a></li>
                <li class="nav-item"><a class="nav-link" href="./stays.html">Stays</a></li>
                <li class="nav-item"><a class="nav-link" href="./tours.html">Tours</a></li>
                <li class="nav-item"><a class="nav-link" href="./contact.html">Review us</a></li>
            </ul>
        </div>

        <div class="book_btn">
            <a href="./login.html"><i class="ri-user-3-line"></i> User</a>
        </div>
    </div>
</nav>
<!-- /Navbar -->


<!-- REGISTER SECTION -->
<div class="register-page">

    <div class="register-box text-center">

        <h3 class="mb-3">Create your account</h3>

        <!-- Social Buttons -->
        <div class="d-flex social gap-3 justify-content-center mb-4">
            <a href="#">LinkedIn</a>
            <a href="#">Google</a>
            <a href="#">Facebook</a>
        </div>

        <span class="text-light">or register with email</span>

        <!-- FORM -->
        <form class="mt-4">

            <input type="text" class="form-control mb-3" placeholder="Your Name">

            <input type="text" class="form-control mb-3" placeholder="Mobile Number">

            <input type="email" class="form-control mb-3" placeholder="Email">

            <input type="password" class="form-control mb-3" placeholder="Password">

            <button type="submit" class="sign_btn">Create Account</button>

        </form>

        <div class="backup mt-3">
            <p>Already have an account? <a href="./login.html">Sign in</a></p>
        </div>

    </div>

</div>
<!-- /REGISTER SECTION -->


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
